# openconnect-auto-sso configuration (TOML).
# Copy to ~/.config/openconnect-auto-sso/config.toml and edit it there
# (kept outside the repo). An in-repo config.toml also works for development.
#
# ./install.sh SEEDS your real config by copying this file verbatim, so anything left
# UNCOMMENTED here is pinned into your config forever -- the built-in default can no
# longer reach you, even if it changes. So only `server` (which you must supply) is
# active below. Every other key is shown commented WITH ITS DEFAULT: uncomment one only
# when you actually want to override it.

# VPN server: hostname or full URL. Required -- this is the one value you must set.
server = "vpn.example.com"

# openconnect protocol; "" auto-detects. e.g. "anyconnect", "gp".
# protocol = ""

# What goes through the VPN. One list; each entry's shape decides how it's handled:
#
#   "name.example.com"   a DNS name -> resolve it via the VPN's DNS AND route every
#                        IP it answers with through the tunnel (a macOS
#                        /etc/resolver suffix match, so it covers that host and all
#                        its subdomains: "example.com" covers *.example.com).
#   "10.0.0.0/8"         an IP or CIDR -> a static route through the VPN.
#   "%100.64.0.0/10"     a %CIDR -> EXCLUDE that range from the VPN.
#   "@server"            proxy whatever split-DNS domains the server advertises
#                        (its CISCO_SPLIT_DNS / default domain) -- you needn't name
#                        them yourself.
#   "@internal"          also route the VPN's own pool subnet (server-pushed).
#   "@splits"            also route the server's split-include subnets, if any.
#
# Default is the empty list = full tunnel (everything via the VPN, no proxy).
# via_vpn = []
# example:
# via_vpn = ["example.com", "10.0.0.0/8", "%100.64.0.0/10", "@internal"]
#
# Caveat (DNS-driven routing): a route is injected only when a name is looked up
# through the SYSTEM resolver. An app doing its own DoH/DoT (e.g. a browser's
# "Secure DNS") bypasses /etc/resolver, so no route is added for it -- for those,
# put the destination's CIDR in via_vpn instead of (or in addition to) its name.

# Loopback UDP/TCP port for the DNS-routing proxy (only used when via_vpn lists a name
# or @server).
# proxy_port = 45353

# Allow incoming connections from the VPN (vpn-slice -i). true installs no pf firewall,
# so iCloud Private Relay keeps working -- at the cost of hosts on the VPN being able to
# reach open ports on your machine.
# allow_incoming = false

# Keepalive: ping a host reachable INSIDE the VPN so an idle tunnel isn't dropped.
# "" = off. Use "@dns" to auto-target the VPN's own DNS server (recommended -- it's
# pushed by the connection, always routed, and always up), or a specific in-VPN host.
# keepalive_host = ""
# keepalive_interval = 30

# Heal a collapsed tunnel MTU. After a same-IP Wi-Fi blip, openconnect's in-process reconnect
# can re-probe the path MTU over a still-flaky link and ratchet it to the 576 floor and STAY
# there -- large packets then fail (browser timeouts) while small ones work. When on, the
# keepalive loop detects this (the target answers a small ping but not a large don't-fragment
# one, for a couple of checks) and forces a fresh reconnect, which re-probes cleanly. Needs BOTH
# keepalive (it reuses the keepalive target + loop, so it does nothing when keepalive_host = "")
# and the KeepAlive auto-start agent: healing drops the tunnel on purpose, which only helps if
# something respawns the connect script. Under `install --once` or a manual run nothing does, so
# it turns itself off there (logged) rather than take a degraded-but-up tunnel permanently down.
# mtu_healthcheck = true

# How long openconnect retries in-process after a drop before giving up (seconds; 0 = give
# up at once). There is no single default: it is 30 under the KeepAlive auto-start agent
# (which respawns a fresh connect) and 300 under `install --once` or a manual run (nothing
# restarts those), so leaving this unset is usually right. openconnect cannot reconnect
# across a macOS sleep -- a fresh connect is what actually recovers -- and an outage longer
# than this ends the tunnel. Read "Sleep and wake" in the README before pinning a value here.
# reconnect_timeout = 30      # 300 under --once/manual; unset = pick automatically

# Advanced (usually leave default):
# profile_name = "openconnect-auto-sso"   # Qt persistent-profile storage key
# callback = "localhost:29786"            # openconnect external-browser callback
